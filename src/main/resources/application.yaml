spring:
  application:
    name: kopring
  datasource:
    url: jdbc:h2:mem:kopring;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  data:
    jpa:
      auditing:
        enabled: true

# PostgreSQL로 전환할 때는 위 datasource/jpa 설정을 교체한다.
