services:
  postgres:
    image: postgres:16
    container_name: kopring-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: kopring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - kopring-postgres-data:/var/lib/postgresql/data

volumes:
  kopring-postgres-data: